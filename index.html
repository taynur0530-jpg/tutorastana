<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TutorAstana</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF6B1A;--ord:#D94E08;--text:#111008;--muted:#7A6A5A;--border:#EDEBE8;--bg:#FAFAF8;--wh:#fff;--err:#E53E3E;--ok:#38A169}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;padding:0 60px;display:flex;align-items:center;justify-content:space-between;transition:all .3s;border-bottom:1px solid transparent}
nav.solid{background:rgba(250,250,248,.96);backdrop-filter:blur(16px);border-color:var(--border)}
nav.on-hero .nav-name{color:#fff}
nav.on-hero .nav-link{color:rgba(255,255,255,.8)}
nav.on-hero .nav-link:hover{color:#fff}
nav.solid .nav-name{color:var(--text)}
nav.solid .nav-link{color:var(--muted)}
nav.solid .nav-link:hover{color:var(--or)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.nav-mark{width:34px;height:34px;background:var(--or);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff}
.nav-name{font-weight:700;font-size:15px;transition:color .3s}
.nav-right{display:flex;align-items:center;gap:18px}
.nav-link{font-size:14px;text-decoration:none;cursor:pointer;transition:color .2s}
.nav-btn{background:var(--or);color:#fff;font-weight:700;font-size:13px;padding:9px 20px;border-radius:9px;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:background .2s;white-space:nowrap}
.nav-btn:hover{background:var(--ord)}

/* LANGUAGE SWITCHER */
.lang-sw{display:flex;align-items:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:8px;padding:3px;gap:1px;transition:all .3s}
nav.solid .lang-sw{background:var(--bg);border-color:var(--border)}
.lb{font-size:11px;font-weight:700;padding:5px 8px;border-radius:5px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.55);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
nav.solid .lb{color:var(--muted)}
.lb.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
nav.solid .lb.active{background:var(--or);color:#fff}
.lb:hover:not(.active){background:rgba(255,255,255,.15);color:#fff}
nav.solid .lb:hover:not(.active){background:var(--border);color:var(--text)}

/* HAMBURGER */
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.nav-ham span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
nav.solid .nav-ham span{background:var(--text)}
nav.menu-open .nav-ham span:nth-child(1){transform:translateY(7px) rotate(45deg)}
nav.menu-open .nav-ham span:nth-child(2){opacity:0;transform:scaleX(0)}
nav.menu-open .nav-ham span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* MOBILE MENU */
.mob-menu{display:none;position:fixed;inset:0;z-index:150;background:var(--wh);flex-direction:column;padding:86px 28px 36px;gap:2px}
.mob-menu.open{display:flex}
.mm-lnk{font-size:20px;font-weight:600;color:var(--text);padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.mm-lnk::after{content:'→';font-size:15px;color:var(--muted)}
.mm-btn{background:var(--or);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;padding:15px;border-radius:12px;border:none;cursor:pointer;margin-top:18px;width:100%}
.mob-lang{display:flex;gap:8px;margin-top:16px}
.mob-lb{flex:1;padding:11px 4px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:var(--muted);background:none;cursor:pointer;transition:all .2s;text-align:center}
.mob-lb.active{background:var(--or);color:#fff;border-color:var(--or)}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── HERO ── */
.hero{height:88vh;min-height:580px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;background:#1a0e05}
.hero-bg{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=1600&q=80&fit=crop');background-size:cover;background-position:center 30%;opacity:.55;transition:transform 8s ease}
.hero:hover .hero-bg{transform:scale(1.03)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(15,5,0,.35) 0%,rgba(15,5,0,.15) 40%,rgba(15,5,0,.55) 100%)}
.hero-content{position:relative;z-index:2;max-width:820px;padding:0 24px}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(8px);color:rgba(255,255,255,.9);font-size:12px;font-weight:600;letter-spacing:.8px;padding:6px 16px;border-radius:100px;margin-bottom:24px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#FF6B1A;box-shadow:0 0 6px #FF6B1A}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(38px,5vw,70px);line-height:1.08;color:#fff;margin-bottom:16px;text-shadow:0 2px 24px rgba(0,0,0,.3)}
.hero h1 span{color:#FFB347}
.hero-sub{font-size:18px;color:rgba(255,255,255,.82);font-weight:300;line-height:1.65;max-width:520px;margin:0 auto 36px;text-shadow:0 1px 8px rgba(0,0,0,.3)}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;background:#fff;border-radius:14px;padding:6px 6px 6px 20px;max-width:700px;margin:0 auto 18px;box-shadow:0 8px 40px rgba(0,0,0,.28);transition:box-shadow .2s}
.search-bar:focus-within{box-shadow:0 8px 48px rgba(255,107,26,.35)}
.sb-field{display:flex;align-items:center;gap:10px;flex:1;padding:10px 0}
.sb-field input{border:none;outline:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--text);width:100%}
.sb-field input::placeholder{color:#B0A090}
.sb-div{width:1px;height:28px;background:var(--border);flex-shrink:0}
.sb-city{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer}
.sb-city select{border:none;outline:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--muted);cursor:pointer;appearance:none;padding-right:4px}
.sb-btn{background:var(--or);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;padding:13px 28px;border-radius:10px;transition:background .2s,transform .15s;white-space:nowrap}
.sb-btn:hover{background:var(--ord);transform:scale(1.02)}

.hero-tags{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.ht-label{font-size:13px;color:rgba(255,255,255,.6)}
.ht-tag{font-size:13px;color:rgba(255,255,255,.8);padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(6px);cursor:pointer;transition:all .2s;background:rgba(255,255,255,.08)}
.ht-tag:hover{background:rgba(255,107,26,.35);border-color:rgba(255,107,26,.5);color:#fff}

/* STATS STRIP */
.stats-strip{background:var(--wh);border-bottom:1px solid var(--border);padding:28px 60px;display:flex;align-items:center;justify-content:center;gap:56px}
.ss-item{display:flex;align-items:center;gap:14px}
.ss-num{font-family:'DM Serif Display',serif;font-size:26px;color:var(--or)}
.ss-lbl{font-size:13px;color:var(--muted);max-width:110px;line-height:1.3}
.ss-div{width:1px;height:32px;background:var(--border)}

/* HOW */
.how{padding:100px 60px;background:var(--bg);border-bottom:1px solid var(--border)}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:12px}
.sec-h2{font-family:'DM Serif Display',serif;font-size:clamp(28px,3vw,40px);color:var(--text);margin-bottom:48px;letter-spacing:-.3px}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--border);border:1px solid var(--border);border-radius:16px;overflow:hidden;max-width:900px}
.how-card{background:var(--wh);padding:44px 36px;transition:background .2s}
.how-card:hover{background:#FFFAF7}
.how-n{font-weight:800;font-size:12px;color:var(--or);letter-spacing:1.5px;margin-bottom:20px}
.how-card h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:10px}
.how-card p{font-size:14px;color:var(--muted);line-height:1.65;font-weight:300}

/* TUTORS */
.tutors-sec{padding:100px 60px;background:var(--wh)}
.sec-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:48px}
.sec-link{font-size:14px;font-weight:600;color:var(--or);cursor:pointer}
.tutors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px}
.tc{border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer}
.tc:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,.07);border-color:rgba(255,107,26,.25)}
.tc-top{height:64px;display:flex;align-items:center;padding:0 20px;gap:14px;border-bottom:1.5px solid var(--border)}
.tc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.tc-nm{font-weight:700;font-size:14px;color:var(--text)}
.tc-sch{font-size:12px;color:var(--muted)}
.tc-body{padding:18px 20px}
.tc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.tc-tag{font-size:11px;font-weight:600;color:var(--or);background:rgba(255,107,26,.07);padding:3px 9px;border-radius:5px}
.tc-foot{display:flex;align-items:center;justify-content:space-between}
.tc-rate{font-weight:700;font-size:14px;color:var(--text)}
.tc-rate span{font-size:11px;font-weight:400;color:var(--muted)}
.tc-contact{font-size:12px;font-weight:700;color:var(--or);border:1.5px solid rgba(255,107,26,.25);padding:6px 14px;border-radius:7px;transition:background .2s,color .2s}
.tc:hover .tc-contact{background:var(--or);color:#fff;border-color:var(--or)}
/* VERIFIED BADGE */
.vbadge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;flex-shrink:0;vertical-align:middle;margin-left:5px;position:relative;top:-1px}
.vbadge svg{width:22px;height:22px}
.unverified-note{font-size:11px;color:#B0A090;margin-top:8px;display:flex;align-items:center;gap:4px}

/* CTA */
.cta-sec{padding:100px 60px;background:var(--text);text-align:center;position:relative;overflow:hidden}
.cta-sec::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,26,.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.cta-inner{position:relative;z-index:1;max-width:520px;margin:0 auto}
.cta-sec h2{font-family:'DM Serif Display',serif;font-size:clamp(32px,4vw,52px);color:#fff;margin-bottom:14px;letter-spacing:-.3px}
.cta-sec h2 span{color:var(--or)}
.cta-sec p{font-size:16px;color:rgba(255,255,255,.5);font-weight:300;line-height:1.65;margin-bottom:36px}
.cta-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.cta-p{background:var(--or);color:#fff;font-weight:700;font-size:15px;padding:15px 32px;border-radius:10px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background .2s}
.cta-p:hover{background:var(--ord)}
.cta-s{background:none;border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.55);font-size:14px;font-weight:500;padding:13px 28px;border-radius:10px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.cta-s:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.8)}

/* WIZARD */
#s-parent-wizard{background:#F3F4F8}
.wiz-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 40px}
.wiz-prog{font-size:13px;color:var(--muted);margin-bottom:32px;font-weight:500}
.wiz-box{background:var(--wh);border-radius:20px;border:1.5px solid var(--border);padding:52px 48px;width:100%;max-width:560px;box-shadow:0 4px 32px rgba(0,0,0,.06)}
.wiz-q{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);margin-bottom:32px;line-height:1.2}
.choice-list{display:flex;flex-direction:column;gap:10px}
.choice-btn{width:100%;padding:18px 24px;border:1.5px solid var(--border);border-radius:12px;background:var(--wh);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:12px}
.choice-btn:hover{border-color:var(--or);background:rgba(255,107,26,.03);color:var(--or)}
.choice-btn.selected{border-color:var(--or);background:rgba(255,107,26,.06);color:var(--or)}
.cb-emoji{font-size:20px;width:28px;text-align:center}
.wiz-field{margin-bottom:20px}
.wiz-field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.wiz-field input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .2s}
.wiz-field input:focus{border-color:var(--or)}
.phone-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.phone-wrap:focus-within{border-color:var(--or)}
.phone-prefix{background:var(--bg);padding:13px 14px;font-size:15px;font-weight:600;color:var(--muted);border-right:1px solid var(--border);white-space:nowrap}
.phone-wrap input{border:none;outline:none;padding:13px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--text);flex:1;background:var(--wh)}
.cities-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.city-btn{padding:15px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--wh);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.city-btn:hover,.city-btn.selected{border-color:var(--or);background:rgba(255,107,26,.05);color:var(--or)}
.city-icon{font-size:18px}
.subj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.subj-btn{padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--wh);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;text-align:left}
.subj-btn:hover,.subj-btn.selected{border-color:var(--or);background:rgba(255,107,26,.06);color:var(--or)}
.wiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
.wiz-back{background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:color .2s;padding:0}
.wiz-back:hover{color:var(--text)}
.wiz-next{background:var(--or);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;padding:13px 32px;border-radius:10px;border:none;cursor:pointer;transition:background .2s}
.wiz-next:hover{background:var(--ord)}
.wiz-next:disabled{background:#ccc;cursor:not-allowed}
.match-card{border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:all .2s}
.match-card:hover{border-color:rgba(255,107,26,.3);box-shadow:0 6px 24px rgba(0,0,0,.06)}
.match-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;flex-shrink:0}
.match-info h4{font-weight:700;font-size:15px;color:var(--text);margin-bottom:3px}
.match-school{font-size:12px;color:var(--muted);margin-bottom:8px}
.match-tags{display:flex;flex-wrap:wrap;gap:5px}
.match-tag{font-size:11px;font-weight:600;color:var(--or);background:rgba(255,107,26,.07);padding:3px 8px;border-radius:5px}
.match-rate{margin-left:auto;font-weight:700;font-size:15px;color:var(--text);white-space:nowrap;flex-shrink:0}

/* TUTOR REG */
#s-tutor-reg{background:var(--wh)}
.treg-wrap{display:grid;grid-template-columns:1fr 420px;min-height:100vh}
.treg-left{background:var(--or);padding:80px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.treg-left::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.07);top:-100px;right:-100px}
.treg-inner{position:relative;z-index:1}
.treg-left h1{font-family:'DM Serif Display',serif;font-size:44px;color:#fff;line-height:1.1;margin-bottom:18px}
.treg-left p{font-size:16px;color:rgba(255,255,255,.8);line-height:1.7;font-weight:300;margin-bottom:36px}
.perk{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.9);font-size:15px;margin-bottom:14px}
.perk-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.treg-right{padding:48px 40px;overflow-y:auto;border-left:1px solid var(--border)}
.steps-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:36px}
.stab{flex:1;padding-bottom:12px;font-size:12px;font-weight:600;color:var(--muted);text-align:center;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.stab.active{color:var(--or);border-color:var(--or)}
.stab.done{color:var(--text)}
.step-p{display:none}
.step-p.active{display:block}
.form-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--text);background:var(--wh);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--or)}
.field textarea{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.photo-box{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
.photo-box:hover{border-color:var(--or)}
.photo-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ph-ico{font-size:28px;margin-bottom:8px}
.ph-txt{font-size:13px;color:var(--muted)}
.ph-txt strong{color:var(--or)}
.ph-preview{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block}
.subj-rows{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.sr{display:grid;grid-template-columns:1fr 140px 34px;gap:8px;align-items:center}
.sr select,.sr input{padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);background:var(--wh);outline:none;transition:border-color .2s}
.sr select:focus,.sr input:focus{border-color:var(--or)}
.rm{width:34px;height:34px;background:rgba(229,62,62,.07);color:var(--err);border:none;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.rm:hover{background:rgba(229,62,62,.15)}
.add-row{background:none;border:1.5px dashed var(--border);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer;width:100%;transition:all .2s}
.add-row:hover{border-color:var(--or);color:var(--or)}
.days-g{display:flex;flex-direction:column;gap:10px}
.dr{display:grid;grid-template-columns:110px 1fr 1fr;gap:8px;align-items:center}
.day-chk{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer}
.day-chk input{width:15px;height:15px;accent-color:var(--or);cursor:pointer}
.day-chk.on{color:var(--text)}
.dr input[type=time]{padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s}
.dr input[type=time]:focus{border-color:var(--or)}
.btn-next{background:var(--or);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;padding:13px 28px;border-radius:10px;border:none;cursor:pointer;transition:background .2s;width:100%;margin-top:6px}
.btn-next:hover{background:var(--ord)}
.btn-back2{background:none;border:1.5px solid var(--border);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:13px;padding:11px 20px;border-radius:10px;cursor:pointer;transition:all .2s}
.btn-back2:hover{border-color:var(--text);color:var(--text)}
.brow{display:flex;gap:10px;margin-top:6px}
.brow .btn-next{flex:1}
.success-screen{text-align:center;padding:32px 0;display:none}
.sc-check{font-size:52px;margin-bottom:16px}
.sc-h{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:10px}
.sc-p{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:24px}
.sc-btn{display:inline-block;background:var(--or);color:#fff;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;text-decoration:none;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:background .2s}
.sc-btn:hover{background:var(--ord)}

/* FAQ */
.faq-wrap{max-width:760px;margin:0 auto;padding:100px 40px 80px}
.faq-section-lbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding-bottom:12px;border-bottom:1px solid var(--border);margin:32px 0 0}
.faq-item{border-bottom:1px solid var(--border)}
.faq-item summary{display:flex;align-items:center;justify-content:space-between;padding:20px 0;cursor:pointer;font-size:16px;font-weight:600;color:var(--text);list-style:none;user-select:none;gap:16px}
.faq-item summary::-webkit-details-marker{display:none}
.faq-item summary::after{content:'+';font-size:22px;line-height:1;color:var(--or);flex-shrink:0;transition:transform .25s}
.faq-item[open] summary::after{transform:rotate(45deg)}
.faq-item p{padding:0 0 20px;font-size:15px;color:var(--muted);line-height:1.7;font-weight:300}

/* SHARED */
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
.alert.ok{background:rgba(56,161,105,.08);border:1px solid rgba(56,161,105,.2);color:var(--ok)}
.alert.err{background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.2);color:var(--err)}

/* ── MOBILE ── */
@media(max-width:768px){
  nav{height:58px;padding:0 20px}
  .nav-right{display:none}
  .nav-ham{display:flex}
  .hero{height:100svh;min-height:600px}
  .hero h1{font-size:clamp(30px,8vw,46px);line-height:1.1}
  .hero-sub{font-size:15px;margin-bottom:24px}
  .hero-badge{font-size:11px;padding:5px 12px;margin-bottom:16px}
  .search-bar{flex-direction:column;align-items:stretch;padding:12px;border-radius:16px;max-width:100%}
  .sb-field{padding:10px 8px;border-bottom:1px solid var(--border)}
  .sb-city{padding:10px 8px;border-bottom:1px solid var(--border)}
  .sb-div{display:none}
  .sb-btn{border-radius:10px;padding:14px;font-size:16px;margin-top:8px;width:100%}
  .hero-tags{gap:6px}
  .ht-tag{font-size:12px;padding:5px 11px}
  .ht-label{width:100%;text-align:center;margin-bottom:4px}
  .stats-strip{padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0}
  .ss-item{flex-direction:column;align-items:center;text-align:center;padding:18px 8px;gap:4px}
  .ss-num{font-size:22px}
  .ss-lbl{font-size:11px;max-width:80px;text-align:center}
  .ss-div{display:none}
  .ss-item:nth-child(1),.ss-item:nth-child(3){border-right:1px solid var(--border)}
  .ss-item:nth-child(1),.ss-item:nth-child(2){border-bottom:1px solid var(--border)}
  .how{padding:60px 20px}
  .how-grid{grid-template-columns:1fr;max-width:100%}
  .how-card{padding:28px 24px}
  .sec-h2{font-size:26px;margin-bottom:28px}
  .tutors-sec{padding:60px 20px}
  .tutors-grid{grid-template-columns:1fr;max-width:100%}
  .sec-row{flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:28px}
  .cta-sec{padding:60px 24px}
  .cta-btns{flex-direction:column}
  .cta-p,.cta-s{width:100%}
  .wiz-wrap{padding:76px 16px 32px}
  .wiz-box{padding:28px 20px;border-radius:16px}
  .wiz-q{font-size:24px;margin-bottom:24px}
  .treg-wrap{grid-template-columns:1fr}
  .treg-left{padding:40px 24px 32px}
  .treg-left h1{font-size:28px}
  .treg-left p{display:none}
  .treg-right{padding:28px 20px;border-left:none;border-top:1px solid var(--border)}
  .frow{grid-template-columns:1fr}
  .dr{grid-template-columns:96px 1fr 1fr;gap:5px}
  .sr{grid-template-columns:1fr 110px 34px}
  .faq-wrap{padding:80px 20px 60px}
  .faq-item summary{font-size:15px;padding:16px 0}
  #s-login .login-card{padding:28px 20px!important;border-radius:16px!important}
}
@media(max-width:400px){
  .hero h1{font-size:28px}
  .cities-grid{grid-template-columns:1fr}
  .subj-grid{grid-template-columns:1fr}
}
</style>

let lang = 'en';

function setLang(l) {
  lang = l;
  const t = T[l];

  // Apply all data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });

  // Apply placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.dataset.i18nPh;
    if (t[k] !== undefined) el.placeholder = t[k];
  });

  // Update select options with data-i18n
  document.querySelectorAll('option[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k] !== undefined) el.textContent = t[k];
  });

  // Highlight active lang buttons
  document.querySelectorAll('.lb').forEach(b => {
    b.classList.toggle('active',
      (l==='en' && b.textContent==='EN') ||
      (l==='ru' && b.textContent==='RU') ||
      (l==='kz' && b.textContent==='ҚАЗ')
    );
  });
  document.querySelectorAll('.mob-lb').forEach(b => {
    b.classList.toggle('active',
      (l==='en' && b.onclick.toString().includes("'en'")) ||
      (l==='ru' && b.onclick.toString().includes("'ru'")) ||
      (l==='kz' && b.onclick.toString().includes("'kz'"))
    );
  });

  document.documentElement.lang = l==='kz' ? 'kk' : l;

  // Re-render wizard if open
  if (document.getElementById('s-parent-wizard').classList.contains('active')) renderWizStep();
  // Update tutor reg tabs text (they use data-i18n, already handled above)
}

// ═══════════════════ NAVIGATION ═══════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const nav = document.getElementById('nav');
  if (id === 's-home') { nav.classList.remove('solid'); nav.classList.add('on-hero'); }
  else { nav.classList.add('solid'); nav.classList.remove('on-hero'); }
}

function toggleMenu() {
  const nav = document.getElementById('nav');
  const menu = document.getElementById('mobMenu');
  const open = menu.classList.toggle('open');
  nav.classList.toggle('menu-open', open);
  if (open) { nav.classList.add('solid'); nav.classList.remove('on-hero'); }
  else {
    if (document.getElementById('s-home').classList.contains('active') && scrollY < 60) {
      nav.classList.remove('solid'); nav.classList.add('on-hero');
    }
  }
  document.body.style.overflow = open ? 'hidden' : '';
}

function closeMenu() {
  document.getElementById('mobMenu').classList.remove('open');
  document.getElementById('nav').classList.remove('menu-open');
  document.body.style.overflow = '';
}

window.addEventListener('scroll', () => {
  if (document.getElementById('mobMenu').classList.contains('open')) return;
  const nav = document.getElementById('nav');
  if (!document.getElementById('s-home').classList.contains('active')) return;
  const heroH = document.querySelector('.hero')?.offsetHeight || 600;
  if (scrollY > heroH - 80) { nav.classList.add('solid'); nav.classList.remove('on-hero'); }
  else { nav.classList.remove('solid'); nav.classList.add('on-hero'); }
}, {passive:true});

              <button class="choice-btn" onclick="pick('timing','1',this)"><span class="cb-emoji">⚡</span>${t.wiz_t1}</button>
              <button class="choice-btn" onclick="pick('timing','2',this)"><span class="cb-emoji">📅</span>${t.wiz_t2}</button>

    { id:'contact', prog:`${t.wiz_step} 5 ${t.wiz_of} 5`,
      html:`<div class="wiz-q">${t.wiz_contact_q}</div>

            <input type="text" id="p-name" placeholder="${t.wiz_name_ph}" oninput="checkContact()"></div>
            <div class="wiz-field"><label>${t.wiz_phone_lbl}</label>
            <div class="phone-wrap"><span class="phone-prefix">🇰🇿 +7</span>

            <button class="wiz-next" id="wb4" disabled onclick="submitWiz()">${t.wiz_submit}</button></div>` },
    { id:'result', prog:'',
      html:`<div style="text-align:center;padding:8px 0 16px">
              <div style="font-size:48px;margin-bottom:16px">🎯</div>

            </div>
            <div class="match-card">
              <div class="match-av" style="background:linear-gradient(135deg,#FF6B1A,#FFB347)">A</div>
              <div class="match-info"><h4>Aizat K.</h4>
                <div class="match-school">Nazarbayev University · Sciences · 3rd Year</div>

  const prog = document.getElementById('wizProg');
  prog.textContent = step.prog;
  prog.style.display = step.prog ? 'block' : 'none';
  document.getElementById('wizBox').innerHTML = step.html;

  // Restore previous selection visually
  if (wizData[step.id]) {
    document.querySelectorAll('.choice-btn,.city-btn,.subj-btn').forEach(b => {
      if (b.textContent.trim() === wizData[step.id] || b.dataset?.val === wizData[step.id]) b.classList.add('selected');
    });
  }
}

function pick(key, val, el) {
  wizData[key] = val;
  const parent = el.closest('.choice-list,.cities-grid,.subj-grid');
  parent?.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  // enable next button for this step
  const btns = ['wb0','wb1','wb2','wb3','wb4'];
  const btn = document.getElementById(btns[wizStep]);
  if (btn) btn.disabled = false;
}

function wizNext() { wizStep++; renderWizStep(); }
function wizPrev() { if (wizStep>0) { wizStep--; renderWizStep(); } }
function submitWiz() {
  wizData.phone = document.getElementById('p-phone')?.value || '';
  wizData.name = document.getElementById('p-name')?.value || '';
  wizStep = 5; renderWizStep();
}
function checkContact() {
  const name = document.getElementById('p-name')?.value.trim();
  const phone = document.getElementById('p-phone')?.value.trim();
  const btn = document.getElementById('wb4');
  if (btn) btn.disabled = !(name && phone && phone.length >= 7);
}

  document.getElementById(`stab-${from}`).classList.add('done');
  document.getElementById(`treg-${from+1}`).classList.add('active');
  document.getElementById(`stab-${from+1}`).classList.add('active');
  tregStep = from+1;
  window.scrollTo(0,400);
}
function tregBack(from) {
  document.getElementById(`treg-${from}`).classList.remove('active');
  document.getElementById(`stab-${from}`).classList.remove('active');
  document.getElementById(`stab-${from-1}`).classList.remove('done');
  document.getElementById(`treg-${from-1}`).classList.add('active');
  document.getElementById(`stab-${from-1}`).classList.add('active');
  tregStep = from-1;
}

function previewPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('phPlaceholder').innerHTML = `<img src="${e.target.result}" class="ph-preview"><div class="ph-txt" style="font-size:12px">Click to change</div>`;
  };
  reader.readAsDataURL(file);
}

function addSubjRow(name='', price='') {
  const rows = document.getElementById('subjRows');
  const row = document.createElement('div'); row.className = 'sr';
  const t = T[lang];
  row.innerHTML = `<select><option value="">${t.subj_ph}</option>${SUBJECTS.map(s=>`<option ${s===name?'selected':''}>${s}</option>`).join('')}</select>
    <input type="number" placeholder="${t.price_ph}" value="${price}" min="500" step="500">
    <button class="rm" onclick="this.closest('.sr').remove()">×</button>`;
  rows.appendChild(row);
}
addSubjRow('Mathematics','4000'); addSubjRow('English','3500');

function initDays() {
  const g = document.getElementById('daysG');
  DAYS_EN.forEach(day => {
    const row = document.createElement('div'); row.className = 'dr';
    row.innerHTML = `<label class="day-chk" id="dchk-${day}"><input type="checkbox" onchange="toggleDay('${day}',this.checked)"> ${day}</label>
      <input type="time" id="ds-${day}" value="09:00" disabled style="opacity:.4">
      <input type="time" id="de-${day}" value="18:00" disabled style="opacity:.4">`;
    g.appendChild(row);
  });
}
initDays();

function toggleDay(day, on) {
  ['ds-','de-'].forEach(p => {
    const el = document.getElementById(p+day);
    el.disabled = !on; el.style.opacity = on ? '1' : '.4';
  });
  document.getElementById('dchk-'+day).classList.toggle('on', on);
}

function submitTreg() {
  document.querySelectorAll('.step-p').forEach(p => p.classList.remove('active'));
  document.querySelector('.steps-bar').style.display = 'none';
  document.getElementById('treg-alert').style.display = 'none';
  document.getElementById('tregSuccess').style.display = 'block';
  window.scrollTo(0,0);
}

// ═══════════════════ LOGIN ═══════════════════
function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pw = document.getElementById('li-pw').value;
  const alertEl = document.getElementById('login-alert');
  const t = T[lang];
  if (!email || !pw) {
    alertEl.textContent = lang==='ru' ? 'Введите email и пароль.' : lang==='kz' ? 'Email мен құпия сөзді енгізіңіз.' : 'Please enter your email and password.';
    alertEl.className='alert err'; alertEl.style.display='block'; return;
  }
  alertEl.textContent = lang==='ru' ? '✓ Выполняется вход…' : lang==='kz' ? '✓ Кіру орындалуда…' : '✓ Signing in…';
  alertEl.className='alert ok'; alertEl.style.display='block';
  setTimeout(() => showScreen('s-tutor-reg'), 1200);
}

setLang('en');
